services:
  next-blog:
    image: kawagami77/my-next-blog:latest
    working_dir: /app
    container_name: next-blog
    stop_grace_period: 1s
    # 本地驗證 production image 用（VPS 實際部署設定在 first-deploy-laravel/docker-env，
    # 走 mount .env.production 機制）
    env_file:
      - .env
    ports:
      - 80:3000
