<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-labelledby="kawa-logo-title">
  <title id="kawa-logo-title">Kawa</title>
  <desc>Kawa 字標：森林綠 monoline 字體，尾端一片葉子，下方一道河流波紋</desc>

  <!-- 字母 K a w a（monoline，圓頭筆畫） -->
  <g fill="none" stroke="#40916c" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- K -->
    <path d="M20 12 V64" />
    <path d="M48 14 L24 40" />
    <path d="M30 34 L50 64" />
    <!-- a -->
    <circle cx="78" cy="49" r="15" />
    <path d="M93 36 V64" />
    <!-- w -->
    <path d="M106 34 L115 64 L124 44 L133 64 L142 34" />
    <!-- a -->
    <circle cx="170" cy="49" r="15" />
    <path d="M185 36 V64" />
  </g>

  <!-- 從最後一筆冒出的葉子 -->
  <g>
    <path d="M188 31 C 194 14, 212 8, 224 13 C 222 28, 204 38, 190 33 Z" fill="#74c69d" />
    <path d="M191 31 C 200 25, 210 19, 220 15" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- 河流（kawa = 川） -->
  <path d="M16 82 Q 30 74, 44 82 T 72 82 T 100 82 T 128 82 T 156 82 T 184 82"
        fill="none" stroke="#95d5b2" stroke-width="6" stroke-linecap="round" />
  <path d="M40 90 Q 54 84, 68 90 T 96 90 T 124 90 T 152 90"
        fill="none" stroke="#b7e4c7" stroke-width="4" stroke-linecap="round" />
</svg>
